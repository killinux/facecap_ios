name: FaceCapStreamer
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

targets:
  FaceCapStreamer:
    type: application
    platform: iOS
    sources:
      - Sources
      # 文件夹引用：保留 heads/<id>/ 子目录结构，避免各头模纹理重名压平冲突
      - path: Resources/heads
        type: folder
        buildPhase: resources
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: false
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: FaceCap Streamer
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - arkit
        NSCameraUsageDescription: 需要使用前置深度相机进行面部表情捕捉
        NSLocalNetworkUsageDescription: 需要通过本地网络（UDP/OSC）将面捕数据发送到 Blender（Faceit）
        ITSAppUsesNonExemptEncryption: false
